<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Study</title>
    <style>
        body {
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: space-around;
            padding: 50px;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        h1 {
            text-align: center;
            color: #bd68ff;
        }
        .button {
            background-color: #bd68ff;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #9d50d8;
        }
        .ai-mentor {
            margin-top: 30px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Welcome to Global Study</h1>
    <div class="container">
        <div class="card">
            <h2>For Educators</h2>
            <p>Explore resources and tools tailored for educators.</p>
            <button class="button" onclick="openEducatorPortal()">Go to Educator Portal</button>
        </div>
        <div class="card">
            <h2>For Students</h2>
            <p>Discover learning materials and opportunities.</p>
            <button class="button" onclick="openStudentPortal()">Go to Student Portal</button>
        </div>
    </div>
    <div class="ai-mentor">
        <h2>AI Mentor</h2>
        <p>Your personal learning assistant.</p>
        <button class="button" onclick="activateAI()">Chat with AI</button>
        <button class="button" onclick="quickActions()">Quick Actions</button>
        <button class="button" onclick="voiceActivate()">Voice Activation</button>
    </div>
    <script>
        function openEducatorPortal() {
            window.location.href = 'educator-portal.html';
        }
        function openStudentPortal() {
            window.location.href = 'student-portal.html';
        }
        function activateAI() {
            // Code to activate AI chat functionality
            alert('AI Mentor activated for chat!');
        }
        function quickActions() {
            // Code for quick actions
            alert('Quick actions are ready!');
        }
        function voiceActivate() {
            // Code to initiate voice activation
            alert('Voice activation enabled!');
        }
    </script>
</body>
</html>
