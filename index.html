<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>GlobalStudy AI Mentor</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        #chat-widget {\n            position: fixed;\n            bottom: 20px;\n            right: 20px;\n            width: 300px;\n            background: white;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);\n            border-radius: 10px;\n            overflow: hidden;\n            z-index: 1000;\n            display: flex;\n            flex-direction: column;\n            animation: pulse 2s infinite;\n        }\n        @keyframes pulse {\n            0% { box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); }\n            50% { box-shadow: 0 0 20px rgba(0, 255, 0, 1); }\n            100% { box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); }\n        }\n        .chat-header {\n            background: #4CAF50;\n            color: white;\n            padding: 10px;\n            text-align: center;\n        }\n        .chat-body {\n            padding: 10px;\n            flex: 1;\n            display: flex;\n            flex-direction: column;\n        }\n        .chat-input {\n            margin-top: 10px;\n            display: flex;\n        }\n        .chat-input input {\n            flex: 1;\n            padding: 10px;\n            border-radius: 5px;\n            border: 1px solid #ccc;\n        }\n        .chat-input button {\n            padding: 10px;\n            border: none;\n            background: #4CAF50;\n            color: white;\n            border-radius: 5px;\n            margin-left: 5px;\n        }\n    </style>\n</head>\n<body>\n    <div id="chat-widget">\n        <div class="chat-header"><i class="fas fa-brain"></i> GlobalStudy AI Mentor</div>\n        <div class="chat-body">\n            <div id="chat-messages"></div>\n            <div class="chat-input">\n                <input type="text" aria-label="Type your message here" placeholder="Type your message..." />\n                <button aria-label="Send message">Send</button>\n            </div>\n        </div>\n    </div>\n    <script src="https://kit.fontawesome.com/a076d05399.js"></script>\n</body>\n</html>
