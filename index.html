<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Study</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #9b59b6; /* breathtaking purple */
            color: #ffffff; /* white text for high contrast */
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <header>
            <h1>Global Study</h1>
            <p id="mission-statement" aria-label="Accessibility First mission statement">Our mission is to make education accessible and inclusive for all students and teachers.</p>
        </header>
        <main>
            <section>
                <h2>Features</h2>
                <ul>
                    <li aria-label="Voice-to-Text for students">Voice-to-Text for students</li>
                    <li aria-label="AI-assisted lesson planning for teachers">AI-assisted lesson planning for teachers</li>
                    <li aria-label="Screen Reader Friendly UI">Screen Reader Friendly UI</li>
                </ul>
            </section>
        </main>
        <footer>
            <button aria-label="Start your inclusive journey">Start Your Inclusive Journey</button>
        </footer>
    </div>
</body>
</html>
