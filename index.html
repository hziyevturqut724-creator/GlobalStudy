<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Study</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1F1C3C, #928DAB);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .cta-button {
            background: linear-gradient(135deg, #9B59B6, #8E44AD);
            border: none;
            color: white;
            padding: 15px 30px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            transition: background 0.3s ease;
        }
        .cta-button:hover {
            background: linear-gradient(135deg, #8E44AD, #9B59B6);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hero {
            animation: fadeIn 2s;
        }
    </style>
</head>
<body>
    <div class="container hero">
        <h1>Welcome to Global Study</h1>
        <p>Your journey to knowledge starts here.</p>
        <button class="cta-button">Start Learning</button>
    </div>
</body>
</html>
