<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Global Study - Dual Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .portal {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }
        .portal h2 {
            color: #da77f2;
        }
        .portal a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            color: white;
            background-color: #bd60ff;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .portal a:hover {
            background-color: #a348c4;
        }
    </style>
</head>
<body>
    <div class="portal">
        <h2>Educators Portal</h2>
        <p>Access resources and tools for teaching.</p>
        <a href="#">Enter</a>
    </div>
    <div class="portal">
        <h2>Students Portal</h2>
        <p>Explore materials and get support.</p>
        <a href="#">Enter</a>
    </div>
</body>
</html>
